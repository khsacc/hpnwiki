[build]
  command = "yarn build"
  # generate-meta.mjs は yarn build 内で実行されます（package.json の build スクリプト参照）
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "GITHUB_BRANCH,GITHUB_REPO"
  NODE_OPTIONS = "--max-old-space-size=4096"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# TinaCMS 管理画面の /admin/* をリダイレクト（ビルド済み静的ファイルへ）
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# ローカル開発時: TINA_PUBLIC_IS_LOCAL=true を設定して yarn dev を実行
